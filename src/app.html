<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%" data-theme="winter">
	<head>
		<script>
			(function () {
				function readCookie(name) {
					var prefix = name + '=';
					var parts = document.cookie.split(';');
					for (var i = 0; i < parts.length; i += 1) {
						var trimmed = parts[i].trim();
						if (trimmed.indexOf(prefix) === 0)
							return decodeURIComponent(trimmed.slice(prefix.length));
					}
					return null;
				}

				var themes = [
					'light',
					'dark',
					'cupcake',
					'bumblebee',
					'emerald',
					'corporate',
					'synthwave',
					'retro',
					'cyberpunk',
					'valentine',
					'halloween',
					'garden',
					'forest',
					'aqua',
					'lofi',
					'pastel',
					'fantasy',
					'wireframe',
					'black',
					'luxury',
					'dracula',
					'cmyk',
					'autumn',
					'business',
					'acid',
					'lemonade',
					'night',
					'coffee',
					'winter',
					'dim',
					'nord',
					'sunset',
					'caramellate',
					'abyss',
					'silk'
				];
				var fonts = [
					'maple-mono',
					'adwaita-sans',
					'adwaita-mono',
					'roboto',
					'arial',
					'times-new-roman',
					'comic-relief',
					'pangolin'
				];
				try {
					var rawTheme =
						readCookie('phh-ui-theme') ||
						localStorage.getItem('phh-ui-theme') ||
						localStorage.getItem('docs-theme') ||
						'system';
					var theme = rawTheme;
					if (theme === 'system') {
						theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'winter';
					}
					if (themes.indexOf(theme) !== -1) {
						document.documentElement.setAttribute('data-theme', theme);
					}

					var font = readCookie('phh-ui-font') || localStorage.getItem('phh-ui-font') || 'roboto';
					if (fonts.indexOf(font) !== -1) {
						document.documentElement.setAttribute('data-font', font);
					}
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
